<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kura River Project — Interactive Maps</title>
  <style>
    :root{--bg:#0b1220;--card:#0f1a33;--text:#e5e7eb;--muted:#9aa4b2;--accent:#22c55e;--accent2:#60a5fa;}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;}
    .wrap{height:100%;display:grid;grid-template-rows:auto 1fr;}
    header{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid rgba(148,163,184,.18);}
    .left{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .badge{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(148,163,184,.18);}
    .btns{display:flex;gap:8px;flex-wrap:wrap;}
    button{cursor:pointer;border:1px solid rgba(148,163,184,.22);background:rgba(255,255,255,.06);color:var(--text);padding:8px 10px;border-radius:10px;font-weight:700;}
    button.active{border-color:rgba(34,197,94,.65);background:rgba(34,197,94,.14);}
    a{color:var(--accent2);text-decoration:none;font-weight:700;}
    a:hover{text-decoration:underline;}
    .note{color:var(--muted);font-size:12px;}
    iframe{width:100%;height:100%;border:0;background:#fff;}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="left">
        <div class="badge">🌿 <strong>Kura River Project</strong></div>
        <div class="btns">
          <button id="btnSchools" class="active" type="button">Schools</button>
          <button id="btnDanger" type="button">Danger Zones</button>
        </div>
        <div class="note">Tip: use the layer control inside each map (top-right) to toggle labels and layers.</div>
      </div>
      <div><a href="../index.html#map" target="_top" rel="noreferrer">Back to website</a></div>
    </header>

    <iframe id="frame" title="Kura River Project map" src="schools.html" loading="lazy"></iframe>
  </div>

  <script>
    const frame = document.getElementById('frame');
    const btnSchools = document.getElementById('btnSchools');
    const btnDanger = document.getElementById('btnDanger');

    function setActive(which){
      const isSchools = which === 'schools';
      btnSchools.classList.toggle('active', isSchools);
      btnDanger.classList.toggle('active', !isSchools);
      frame.src = isSchools ? 'schools.html' : 'danger.html';
    }

    btnSchools.addEventListener('click', () => setActive('schools'));
    btnDanger.addEventListener('click', () => setActive('danger'));
  </script>
</body>
</html>
