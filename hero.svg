<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f2a3a"/>
      <stop offset="1" stop-color="#052e1f"/>
    </linearGradient>
    <radialGradient id="r" cx="30%" cy="25%" r="65%">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r2" cx="70%" cy="70%" r="70%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#r)"/>
  <rect width="1600" height="900" fill="url(#r2)"/>

  <!-- river line (stylized) -->
  <path d="M 80 220 C 260 120, 380 300, 520 240 C 680 170, 820 340, 980 280 C 1120 230, 1250 420, 1440 360" fill="none" stroke="#60a5fa" stroke-width="10" stroke-linecap="round" stroke-opacity="0.55" filter="url(#blur)"/>
  <path d="M 80 220 C 260 120, 380 300, 520 240 C 680 170, 820 340, 980 280 C 1120 230, 1250 420, 1440 360" fill="none" stroke="#93c5fd" stroke-width="3" stroke-linecap="round" stroke-opacity="0.75"/>

  <!-- subtle grid -->
  <g opacity="0.12">
    <path d="M0 120 H1600" stroke="#e5e7eb"/>
    <path d="M0 260 H1600" stroke="#e5e7eb"/>
    <path d="M0 400 H1600" stroke="#e5e7eb"/>
    <path d="M0 540 H1600" stroke="#e5e7eb"/>
    <path d="M0 680 H1600" stroke="#e5e7eb"/>
    <path d="M0 820 H1600" stroke="#e5e7eb"/>
  </g>
</svg>
